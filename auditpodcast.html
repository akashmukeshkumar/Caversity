<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audit Unplugged - Premium Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- 🔥 UNIVERSAL SECURITY LOCK 🔥 -->
    <meta name="page-id" content="caf8">
    <meta name="page-type" content="premium">
    <style id="page-lock">body { display: none !important; }</style>
    <script type="module" src="js/security.js"></script>
    <link rel="stylesheet" href="subjects/caf8_audit/features/css/auditpodcast.css">
</head>
<body>

    <div class="ambient-orb orb-1"></div>
    <div class="ambient-orb orb-2"></div>
    <div class="ambient-orb orb-3"></div>

    <nav class="podcast-nav">
        <a href="audit.html" class="back-btn"><i class="fas fa-arrow-left"></i> Archive</a>
        <div style="font-weight: 700; color: #fff; letter-spacing: 1.5px; font-size: 13px; text-transform: uppercase;">
            <i class="fas fa-bolt" style="color:var(--accent-orange)"></i> Premium Studio
        </div>
    </nav>

    <header class="podcast-hero">
        <div class="hero-badge"><i class="fas fa-satellite-dish"></i> THE AUDIT MASTERCLASS</div>
        <h1 class="hero-title">Audit <span>Unplugged</span></h1>
        <p class="hero-sub">
            The ultimate virtual podcast experience. Dive deep into complex financial frameworks, real-world corporate fraud, and drafting secrets.
        </p>
    </header>

    <audio id="main-audio" crossorigin="anonymous"></audio>

    <main class="playlist-container">
        <div class="episodes-grid" id="podcast-list-container">
            <!-- Podcasts will be dynamically and securely loaded here -->
        </div>
    </main>

    <div id="theater-overlay">
        <div class="theater-card">
            <button class="close-theater" onclick="closeTheater()"><i class="fas fa-times"></i></button>
            
            <div class="studio-image-wrapper">
                <div class="studio-image-container" id="studio-img" style="background-image: url('subjects/caf8_audit/features/assets/podcast-studio.jpg');"></div>
                <div class="spotlight" id="spotlight"></div>
                
                <canvas id="audio-canvas"></canvas>
            </div>

            <div class="theater-controls">
                <div class="control-row">
                    <div class="title-area">
                        <p class="now-playing-sub" id="t-sub">Audit Unplugged</p>
                        <h2 class="now-playing-title" id="t-title">Select an Episode</h2>
                    </div>

                    <div class="buttons-box">
                        <button class="btn-skip" onclick="skip(-15)"><i class="fas fa-undo-alt"></i></button>
                        <button class="btn-circle" id="t-play-btn" onclick="togglePlay()"><i class="fas fa-play"></i></button>
                        <button class="btn-skip" onclick="skip(15)"><i class="fas fa-redo-alt"></i></button>
                    </div>

                    <div class="progress-box">
                        <span id="t-current">00:00</span>
                        <div class="prog-bar-bg" id="t-prog-bg" onclick="seekAudio(event)">
                            <div class="prog-fill" id="t-prog-fill"></div>
                        </div>
                        <span id="t-total">--:--</span>
                    </div>
                </div>
            </div>
        </div>
    </div> 

    <script src="subjects/caf8_audit/features/js/auditpodcast.js"></script>
</body>
</html>
