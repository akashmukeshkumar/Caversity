<!DOCTYPE html>
<html lang="en">
<head>

    <!-- 🔥 UNIVERSAL SECURITY LOCK 🔥 -->
    <meta name="page-id" content="sanctuary">
    <meta name="page-type" content="free">
    <style id="page-lock">body { display: none !important; }</style>
    <script type="module" src="../../../js/security.js"></script>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>The Final Journey | Reality Check</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="grave.css">
</head>
<body>

    <div id="introScreen">
        <h1 class="cinematic-text" style="font-size: 2rem; margin-bottom: 1rem; text-shadow: 0 4px 10px rgba(0,0,0,0.9); color: #fff;">Enter Your Reality</h1>
        <input type="text" id="userName" class="name-input" placeholder="What is your name?" autocomplete="off" spellcheck="false">
        <p class="text-gray-300 text-[11px] mb-8 tracking-widest uppercase text-center px-4" style="text-shadow: 0 2px 5px rgba(0,0,0,0.9);">Rotate your phone & wear headphones<br>for the true experience</p>
        <button onclick="startJourney()" class="choice-btn" style="border-color: #fff; width: auto; font-size: 0.95rem; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);">Begin Journey</button>
    </div>

    <video id="graveVideo" playsinline preload="auto">
        <source src="../assets/grave.mp4" type="video/mp4">
    </video>
    
    <div class="edge-blender"></div>
    <div id="jannahGlow"></div>
    <div id="bloodFlash"></div>

    <div id="uiLayer">
        <h2 id="questionText" class="cinematic-text"></h2>
        <button class="choice-btn" id="btnCorrect" onclick="answer(true)"></button>
        <button class="choice-btn" id="btnWrong" onclick="answer(false)"></button>
        <div id="timerBarContainer"><div id="timerBar"></div></div>
    </div>

   <div id="finalTextLayer">
        <h3 id="outcomeTitle" class="cinematic-text" style="font-size: 1.5rem; color: #ef4444; margin-bottom: 1rem;"></h3>
        <div id="finalHadith" class="final-hadith"></div>
        
        <button id="exitBtn" class="exit-btn" onclick="window.location.href='blueprint.html'">
            Return to Duniya <i class="fas fa-sign-out-alt" style="margin-left: 8px;"></i>
        </button>
    </div>

    <script src="grave.js"></script>
</body>
</html>
